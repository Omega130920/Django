<!DOCTYPE html>
<html>
<head>
    <title>Agent Overview</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 3 columns */
            gap: 10px; /* Space between buttons */
            max-width: 900px; /* Adjust as needed */
            margin: 0 auto; /* Center the buttons */
        }

        .button-block {
            padding: 100px 100px;
            background-color: #4CAF50;
            border: 1px solid #4CAF50;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
            font-size: 1.5em;
        }

        .button-block:hover {
            background-color: #3e8e41;
            border: 1px solid #3e8e41;
        }
    </style>
</head>
<body>
</head>
<body>
    <h1>Welcome to Client Information</h1>  
    <div class="container"></div>
    <div class="button-container">
        <a href="{% url 'client_information' %}" class="button-block">Client_information</a>
        <a href="{% url 'client_details' %}" class="button-block">Client_details</a>
        <a href="{% url 'client_list' %}" class="button-block">Client_list</a>
        <a href="{% url 'arrangements' %}" class="button-block">Arrangements</a>
        <a href="{% url 'create_call' %}" class="button-block">Create Call</a>
        <a href="{% url 'call_list' %}" class="button-block">Call List</a>
    </div>
</body>
</html>
